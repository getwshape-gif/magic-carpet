name: Build MagicCarpet

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn -B clean package --file MagicCarpet/pom.xml
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: MagicCarpet
          path: MagicCarpet/target/MagicCarpet.jar
